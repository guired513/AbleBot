<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/static/app.css" />

  <title>AbleBot</title>
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div class="badge">Prototype</div>
      <h1>AbleBot</h1>
      <p>Accessible AI assistant for text, voice, and image-based support.</p>
      <button class="access-btn" onclick="toggleAccessibility()">Accessibility Mode</button>
    </section>

    <section class="access-panel">
      <button class="access-btn" onclick="setMode('rule-based')">Rule-Based</button>
      <button class="access-btn active" onclick="setMode('bert')">BERT Mode</button>
    </section>

    <section class="chat-card">
      <label for="message">Ask AbleBot</label>
      <textarea id="message" placeholder="Example: How do I apply for PWD ID?"></textarea>
      <div class="chat-actions">
        <button class="voice-btn" onclick="startListening()">🎤 Speak Input</button>
        <button class="primary-btn" onclick="sendMessage()">Send Message</button>
      </div>
      <button class="speak-response-btn" onclick="speakText(lastResponse)">
        🔊 Speak Response
      </button>
      <div id="responseBox" class="response-box">
        AbleBot response will appear here.
       
      </div>

      <div id="metaBox" class="meta-box"> </div>
    </section>

    <section class="tool-grid">
      <div class="tool-card">
        <h2>Image Reader</h2>
        <p>Upload an image with text.</p>
        <label class="file-picker">
          📷 Choose Image
          <input type="file" id="imageInput" accept="image/*" />
        </label>

        <button class="tool-btn" onclick="sendOCR()">Read Image</button>
        <div id="ocrResult" class="mini-result"></div>
      </div>

      <div class="tool-card">
        <h2>Voice Reader</h2>
        <p>Upload an audio file.</p>
        <label class="file-picker">
          🎙 Choose Audio
          <input type="file" id="audioInput" accept="audio/*" />
        </label>

        <button class="tool-btn" onclick="sendSTT()">Transcribe Audio</button>
        <div id="sttResult" class="mini-result"></div>
      </div>
    </section>

    <footer>
      AbleBot Mobile Prototype • Guillermo V. Red, Jr. • 2026
    </footer>
  </main>

  <script src="/static/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</body>
</html>
